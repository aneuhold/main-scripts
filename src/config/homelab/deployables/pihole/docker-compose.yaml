services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: "America/Los_Angeles"
      FTLCONF_LOCAL_IPV4: "0.0.0.0"
      WEBPASSWORD: "${PIHOLE_WEBPASSWORD}"
    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    restart: unless-stopped

volumes:
  pihole_data:
  pihole_dnsmasq:
