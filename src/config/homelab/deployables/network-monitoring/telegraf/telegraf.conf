# Telegraf config for the network-monitoring stack. Collects the router's
# NetFlow v9 export and writes it to InfluxDB, which Grafana queries.
#
# Env vars (INFLUX_*) are injected by the compose service from the stack's .env.

[agent]
  interval = "10s"
  flush_interval = "10s"

# NetFlow collector. The router exports NetFlow v9 to this host on UDP 2055.
# NetFlow v9 carries field templates that the router resends on an interval, so
# flows are undecodable (and dropped) until the first template arrives. Expect a
# short quiet period after a fresh start.
# https://docs.influxdata.com/telegraf/v1/input-plugins/netflow/
[[inputs.netflow]]
  service_address = "udp://:2055"
  protocol_version = "netflow v9"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
